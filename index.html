<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converta Pro - AI Video to Audio Converter</title>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Core theme variables */
            --bg-primary: #0f0f23;
            --bg-secondary: rgba(20, 20, 40, 0.8);
            --bg-glass: rgba(255, 255, 255, 0.05);
            --bg-glass-hover: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent-primary: #8b5cf6;
            --accent-secondary: #a78bfa;
            --accent-glow: 0 0 20px rgba(139, 92, 246, 0.5);
            --border-primary: rgba(255, 255, 255, 0.1);
            --shadow-primary: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 30px rgba(139, 92, 246, 0.3);
            --radius: 24px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --gradient-primary: linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(59, 130, 246, 0.1) 100%);
            --waveform-color: #8b5cf6;
            --waveform-glow: 0 0 15px rgba(139, 92, 246, 0.6);
        }

        /* Light mode overrides */
        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: rgba(248, 250, 252, 0.9);
            --bg-glass: rgba(255, 255, 255, 0.85);
            --bg-glass-hover: rgba(255, 255, 255, 0.95);
            --text-primary: #1e293b;
            --text-secondary: rgba(30, 41, 59, 0.8);
            --border-primary: rgba(30, 41, 59, 0.1);
            --shadow-primary: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --shadow-glow: 0 0 20px rgba(139, 92, 246, 0.4);
            --gradient-primary: linear-gradient(135deg, rgba(139, 92, 246, 0.08) 0%, rgba(59, 130, 246, 0.08) 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            transition: var(--transition);
        }

        /* Animated Background Particles */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: var(--accent-primary);
            border-radius: 50%;
            opacity: 0.1;
            animation: float 20s infinite linear;
            box-shadow: var(--accent-glow);
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.1; }
            90% { opacity: 0.1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        /* Main Layout */
        .app-container {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 380px;
            grid-template-rows: 80px 1fr;
            grid-template-areas: 
                "header header"
                "main sidebar";
            gap: 0;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 1200px) {
            .app-container {
                grid-template-columns: 1fr;
                grid-template-areas: 
                    "header"
                    "main"
                    "sidebar";
            }
        }

        @media (max-width: 768px) {
            .app-container {
                grid-template-rows: 70px 1fr auto;
            }
        }

        /* Header */
        .header {
            grid-area: header;
            backdrop-filter: blur(20px);
            background: var(--bg-glass);
            border-bottom: 1px solid var(--border-primary);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-primary);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            transition: var(--transition);
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .theme-toggle, .theme-selector {
            background: var(--bg-glass);
            border: 1px solid var(--border-primary);
            color: var(--text-primary);
            padding: 0.75rem;
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .theme-toggle:hover, .theme-selector:hover {
            background: var(--bg-glass-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .theme-selector {
            min-width: 120px;
            text-align: center;
        }

        .auth-btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius);
            font-weight: 600;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            box-shadow: var(--shadow-glow);
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.4);
        }

        /* Main Content */
        .main {
            grid-area: main;
            padding: 2rem;
            overflow-y: auto;
            animation: slideIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .upload-zone {
            border: 3px dashed var(--border-primary);
            border-radius: var(--radius);
            padding: 4rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: var(--gradient-primary);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .upload-zone:hover {
            background: var(--bg-glass-hover);
            border-color: var(--accent-primary);
            transform: scale(1.02);
            box-shadow: var(--shadow-glow);
        }

        .upload-zone.dragover {
            border-color: var(--accent-primary);
            background: rgba(139, 92, 246, 0.1);
            transform: scale(1.05);
        }

        .upload-icon {
            font-size: 4rem;
            color: var(--accent-primary);
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* File Info & Controls */
        .file-info {
            margin: 2rem 0;
            padding: 2rem;
            background: var(--bg-glass);
            border-radius: var(--radius);
            border: 1px solid var(--border-primary);
            backdrop-filter: blur(20px);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.6s 0.2s forwards;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        .file-metadata {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .metadata-item {
            display: flex;
            flex-direction: column;
        }

        .metadata-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .metadata-value {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .rename-input {
            background: transparent;
            border: 1px solid var(--border-primary);
            color: var(--text-primary);
            padding: 0.75rem;
            border-radius: 12px;
            font-size: 1rem;
            transition: var(--transition);
        }

        .rename-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: var(--accent-glow);
        }

        /* Waveform & Preview */
        .audio-preview {
            margin: 2rem 0;
            text-align: center;
        }

        #waveformCanvas {
            width: 100%;
            height: 120px;
            border-radius: var(--radius);
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            margin-bottom: 1rem;
            box-shadow: var(--shadow-primary);
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: var(--radius);
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            box-shadow: var(--shadow-glow);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 25px 50px rgba(139, 92, 246, 0.4);
        }

        .btn-secondary {
            background: var(--bg-glass);
            color: var(--text-primary);
            border: 1px solid var(--border-primary);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Progress Ring */
        .progress-container {
            margin: 2rem 0;
            text-align: center;
        }

        .progress-ring {
            width: 200px;
            height: 200px;
            position: relative;
            margin: 0 auto 1rem;
        }

        .progress-circle {
            transform: rotate(-90deg);
            transition: stroke-dasharray 0.3s ease;
        }

        .progress-circle-bg {
            fill: none;
            stroke: var(--border-primary);
            stroke-width: 8;
        }

        .progress-circle-fg {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 0 471;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Sidebar */
        .sidebar {
            grid-area: sidebar;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--border-primary);
            padding: 2rem;
            overflow-y: auto;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        @media (max-width: 1200px) {
            .sidebar {
                position: relative;
                height: auto;
                border-left: none;
                border-top: 1px solid var(--border-primary);
            }
        }

        .history, .settings {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .history-item {
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border-primary);
        }

        .history-item:hover {
            transform: translateX(5px);
            box-shadow: var(--shadow-glow);
        }

        /* Export Options */
        .export-options {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .format-option {
            flex: 1;
            min-width: 100px;
        }

        /* Pro Features */
        .pro-features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }

        .feature-btn {
            height: 60px;
            padding: 0.75rem;
            text-align: center;
            font-size: 0.875rem;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .main {
                padding: 1rem;
            }
            
            .header {
                padding: 0 1rem;
            }
            
            .upload-zone {
                padding: 2rem 1rem;
            }
            
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .btn {
                justify-content: center;
            }
        }

        /* Overlay Pages */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .overlay-content {
            background: var(--bg-glass);
            padding: 3rem;
            border-radius: var(--radius);
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border-primary);
            transform: scale(0.8) translateY(20px);
            transition: var(--transition);
        }

        .overlay.active .overlay-content {
            transform: scale(1) translateY(0);
        }

        /* Theme Preview */
        .theme-preview {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .theme-swatch {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: var(--transition);
            position: relative;
        }

        .theme-swatch.active {
            border-color: var(--accent-primary);
            transform: scale(1.2);
        }

        /* Loading States */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--border-primary);
            border-radius: 50%;
            border-top-color: var(--accent-primary);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 4px;
        }
    </style>
</head>
<body data-theme="dark">
    <!-- Animated Particles -->
    <div id="particles"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo" onclick="resetApp()">🎵 Converta Pro</div>
            <div class="header-actions">
                <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="theme-selector" onclick="toggleThemeOverlay()">
                    <span id="currentTheme">Indigo</span> <i class="fas fa-chevron-down"></i>
                </div>
                <button class="auth-btn" id="authBtn" onclick="toggleAuth()">
                    <i class="fab fa-google"></i> Sign In
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Upload Zone -->
            <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">
                    <i class="fas fa-cloud-upload-alt"></i>
                </div>
                <h2>Drop your video here or click to browse</h2>
                <p style="color: var(--text-secondary);">Supports MP4, MOV, AVI, MKV up to 500MB</p>
                <input type="file" id="fileInput" accept="video/*" style="display: none;">
            </div>

            <!-- File Info -->
            <div class="file-info" id="fileInfo" style="display: none;">
                <div class="file-metadata">
                    <div class="metadata-item">
                        <label class="metadata-label">Filename</label>
                        <div class="metadata-value">
                            <input type="text" class="rename-input" id="fileNameInput" placeholder="Enter new filename">
                        </div>
                    </div>
                    <div class="metadata-item">
                        <label class="metadata-label">Duration</label>
                        <div class="metadata-value" id="duration">--:--</div>
                    </div>
                    <div class="metadata-item">
                        <label class="metadata-label">Size</label>
                        <div class="metadata-value" id="fileSize">--</div>
                    </div>
                    <div class="metadata-item">
                        <label class="metadata-label">Format</label>
                        <div class="metadata-value" id="fileFormat">Unknown</div>
                    </div>
                </div>

                <!-- Pro Features -->
                <div class="pro-features">
                    <button class="feature-btn btn-secondary" onclick="applyPreset('loud')">
                        <i class="fas fa-volume-up"></i><br>Loud
                    </button>
                    <button class="feature-btn btn-secondary" onclick="applyPreset('clear')">
                        <i class="fas fa-magic"></i><br>Clear
                    </button>
                    <button class="feature-btn btn-secondary" onclick="toggleNormalizer()">
                        <i class="fas fa-chart-line"></i><br>Normalize
                    </button>
                    <button class="feature-btn btn-secondary" onclick="enableBatchMode()">
                        <i class="fas fa-layer-group"></i><br>Batch
                    </button>
                </div>

                <!-- Audio Preview -->
                <div class="audio-preview">
                    <canvas id="waveformCanvas"></canvas>
                    <div class="controls">
                        <button class="btn btn-secondary" id="playBtn" onclick="togglePlayback()">
                            <i class="fas fa-play"></i> Play Preview
                        </button>
                        <button class="btn btn-primary" id="convertBtn" onclick="startConversion()" disabled>
                            <i class="fas fa-download"></i> Convert to Audio
                        </button>
                    </div>
                </div>

                <!-- Export Options -->
                <div style="text-align: center; margin-top: 1rem;">
                    <label>Export as: </label>
                    <div class="export-options">
                        <label class="format-option">
                            <input type="radio" name="format" value="mp3" checked> MP3
                        </label>
                        <label class="format-option">
                            <input type="radio" name="format" value="wav"> WAV
                        </label>
                        <label class="format-option">
                            <input type="radio" name="format" value="aac"> AAC
                        </label>
                    </div>
                </div>
            </div>

            <!-- Progress -->
            <div class="progress-container" id="progressContainer" style="display: none;">
                <div class="progress-ring">
                    <svg width="200" height="200">
                        <defs>
                            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="var(--accent-primary)"/>
                                <stop offset="100%" stop-color="var(--accent-secondary)"/>
                            </linearGradient>
                        </defs>
                        <circle class="progress-circle-bg" cx="100" cy="100" r="75"/>
                        <circle class="progress-circle-fg" cx="100" cy="100" r="75" id="progressCircle"/>
                    </svg>
                    <div class="progress-text" id="progressText">0%</div>
                </div>
                <p id="progressLabel">Preparing FFmpeg...</p>
            </div>
        </main>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="history">
                <h3 class="section-title">
                    <i class="fas fa-history"></i> Conversion History
                </h3>
                <div id="historyList">Sign in to save your conversions</div>
            </div>

            <div class="settings">
                <h3 class="section-title">
                    <i class="fas fa-sliders-h"></i> Pro Settings
                </h3>
                <div style="display: grid; gap: 1rem;">
                    <label>
                        <input type="checkbox" id="normalizeAudio"> Normalize Volume
                    </label>
                    <label>
                        <input type="range" id="volumeSlider" min="0.5" max="2" step="0.1" value="1"> Volume: <span id="volumeValue">1.0x</span>
                    </label>
                    <label>
                        <input type="checkbox" id="removeNoise"> Noise Reduction
                    </label>
                </div>
            </div>
        </aside>
    </div>

    <!-- Theme Overlay -->
    <div class="overlay" id="themeOverlay">
        <div class="overlay-content">
            <h2 style="margin-bottom: 1.5rem;"><i class="fas fa-palette"></i> Choose Theme</h2>
            <div id="themePreviews" style="display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center;"></div>
            <button class="btn btn-primary" onclick="toggleThemeOverlay()" style="width: 100%; margin-top: 2rem;">
                Done
            </button>
        </div>
    </div>

    <!-- Auth Overlay -->
    <div class="overlay" id="authOverlay">
        <div class="overlay-content">
            <h2 style="margin-bottom: 1.5rem;"><i class="fas fa-sign-in-alt"></i> Sign In</h2>
            <div id="g_id_onload"></div>
            <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left"></div>
            <p style="text-align: center; margin-top: 1rem; color: var(--text-secondary);">Or use email/password</p>
            <button class="btn btn-secondary" style="width: 100%; margin-top: 1rem;" onclick="emailLogin()">Email Login</button>
        </div>
    </div>

    <script>
        // Global State
        let currentFile = null;
        let audioContext = null;
        let audioBuffer = null;
        let isPlaying = false;
        let ffmpeg = null;
        let user = null;
        let currentTheme = 'indigo';
        let isDark = true;
        let history = JSON.parse(localStorage.getItem('conversionHistory') || '[]');

        // Theme System (12 Professional Themes)
        const themes = {
            indigo: { '--accent-primary': '#8b5cf6', '--accent-secondary': '#a78bfa', '--waveform-color': '#8b5cf6' },
            emerald: { '--accent-primary': '#10b981', '--accent-secondary': '#34d399', '--waveform-color': '#10b981' },
            rose: { '--accent-primary': '#ec4899', '--accent-secondary': '#f472b6', '--waveform-color': '#ec4899' },
            amber: { '--accent-primary': '#f59e0b', '--accent-secondary': '#fbbf24', '--waveform-color': '#f59e0b' },
            cyan: { '--accent-primary': '#06b6d4', '--accent-secondary': '#22d3ee', '--waveform-color': '#06b6d4' },
            lime: { '--accent-primary': '#84cc16', '--accent-secondary': '#a3e635', '--waveform-color': '#84cc16' },
            violet: { '--accent-primary': '#a855f7', '--accent-secondary': '#c084fc', '--waveform-color': '#a855f7' },
            sky: { '--accent-primary': '#0ea5e9', '--accent-secondary': '#38bdf8', '--waveform-color': '#0ea5e9' },
            orange: { '--accent-primary': '#f97316', '--accent-secondary': '#fb923c', '--waveform-color': '#f97316' },
            pink: { '--accent-primary': '#ec4899', '--accent-secondary': '#f472b6', '--waveform-color': '#ec4899' },
            teal: { '--accent-primary': '#14b8a6', '--accent-secondary': '#2dd4bf', '--waveform-color': '#14b8a6' },
            fuchsia: { '--accent-primary': '#d946ef', '--accent-secondary': '#f0abfc', '--waveform-color': '#d946ef' }
        };

        // Initialize App
        async function init() {
            createParticles();
            initFFmpeg();
            updateHistory();
            initGoogleAuth();
            updateTheme();
            document.getElementById('volumeSlider').addEventListener('input', function(e) {
                document.getElementById('volumeValue').textContent = e.target.value + 'x';
            });
        }

        // Particles Animation
        function createParticles() {
            const particles = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = particle.style.height = (Math.random() * 4 + 2) + 'px';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (Math.random() * 20 + 20) + 's';
                particles.appendChild(particle);
            }
        }

        // FFmpeg Initialization
        async function initFFmpeg() {
            const { FFmpeg } = FFmpegWASM;
            ffmpeg = new FFmpeg();
            await ffmpeg.load({
                coreURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js',
                wasmURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.wasm',
            });
        }

        // File Handling
        document.getElementById('fileInput').addEventListener('change', handleFile);
        document.getElementById('uploadZone').addEventListener('dragover', handleDragOver);
        document.getElementById('uploadZone').addEventListener('dragleave', handleDragLeave);
        document.getElementById('uploadZone').addEventListener('drop', handleDrop);

        function handleDragOver(e) {
            e.preventDefault();
            document.getElementById('uploadZone').classList.add('dragover');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            document.getElementById('uploadZone').classList.remove('dragover');
        }

        function handleDrop(e) {
            e.preventDefault();
            document.getElementById('uploadZone').classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files);
            handleFiles(files);
        }

        async function handleFile(e) {
            const files = Array.from(e.target.files);
            handleFiles(files);
        }

        async function handleFiles(files) {
            if (files.length === 0) return;
            currentFile = files[0];
            
            const fileInfo = document.getElementById('fileInfo');
            document.getElementById('fileNameInput').value = currentFile.name.replace(/\.[^/.]+$/, '');
            await loadFileMetadata(currentFile);
            fileInfo.style.display = 'block';
            await createAudioPreview(currentFile);
            document.getElementById('convertBtn').disabled = false;
        }

        async function loadFileMetadata(file) {
            const audio = new Audio(URL.createObjectURL(file));
            return new Promise((resolve) => {
                audio.onloadedmetadata = () => {
                    document.getElementById('duration').textContent = formatTime(audio.duration);
                    document.getElementById('fileSize').textContent = formatBytes(file.size);
                    document.getElementById('fileFormat').textContent = file.name.split('.').pop().toUpperCase();
                    resolve();
                };
            });
        }

        // Audio Preview & Waveform
        async function createAudioPreview(file) {
            const arrayBuffer = await file.arrayBuffer();
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            renderWaveform();
        }

        function renderWaveform() {
            const canvas = document.getElementById('waveformCanvas');
            const ctx = canvas.getContext('2d');
            const width = canvas.width = canvas.offsetWidth;
            const height = canvas.height = canvas.offsetHeight;
            
            const barWidth = width / audioBuffer.length;
            const barCount = Math.floor(width / 4);
            
            ctx.fillStyle = 'var(--bg-secondary)';
            ctx.fillRect(0, 0, width, height);
            
            for (let i = 0; i < barCount; i++) {
                const barHeight = (Math.abs(audioBuffer.getChannelData(0)[Math.floor((i / barCount) * audioBuffer.length)])) * height * 1.5;
                const x = i * 4;
                ctx.fillStyle = `hsl(${240 + barHeight / height * 60}, 70%, 50%)`;
                ctx.shadowColor = 'var(--waveform-color)';
                ctx.shadowBlur = 10;
                ctx.fillRect(x, height/2 - barHeight/2, 2, barHeight);
            }
        }

        function togglePlayback() {
            if (!audioContext || !audioBuffer) return;
            
            const source = audioContext.createBufferSource();
            source.buffer = audioBuffer;
            const gainNode = audioContext.createGain();
            gainNode.gain.value = parseFloat(document.getElementById('volumeSlider').value);
            source.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            if (isPlaying) {
                audioContext.suspend();
                document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i> Play Preview';
            } else {
                audioContext.resume();
                source.start(0);
                document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i> Playing...';
            }
            isPlaying = !isPlaying;
        }

        // FFmpeg Conversion
        async function startConversion() {
            const format = document.querySelector('input[name="format"]:checked').value;
            const outputName = document.getElementById('fileNameInput').value || 'output';
            const progressContainer = document.getElementById('progressContainer');
            const progressLabel = document.getElementById('progressLabel');
            
            progressContainer.style.display = 'block';
            document.querySelectorAll('button').forEach(btn => btn.disabled = true);
            
            try {
                progressLabel.textContent = 'Loading file...';
                await ffmpeg.writeFile('input.' + currentFile.name.split('.').pop(), new Uint8Array(await currentFile.arrayBuffer()));
                
                let command = ['-i', 'input.' + currentFile.name.split('.').pop()];
                
                // Pro features
                if (document.getElementById('normalizeAudio').checked) {
                    command.push('-af', 'loudnorm');
                }
                if (document.getElementById('removeNoise').checked) {
                    command.push('-af', 'afftdn');
                }
                
                // Volume adjustment
                const volume = document.getElementById('volumeSlider').value;
                if (volume !== '1') {
                    command.push('-af', `volume=${volume}`);
                }
                
                // Format-specific
                if (format === 'mp3') {
                    command.push('-c:a', 'libmp3lame', '-b:a', '320k');
                } else if (format === 'wav') {
                    command.push('-c:a', 'pcm_s16le');
                } else if (format === 'aac') {
                    command.push('-c:a', 'aac');
                }
                
                command.push(outputName + '.' + format);
                
                progressLabel.textContent = 'Converting...';
                await ffmpeg.exec(...command);
                
                const data = await ffmpeg.readFile(outputName + '.' + format);
                const blob = new Blob([data.buffer], { type: 'audio/' + format });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = outputName + '.' + format;
                a.click();
                
                // Save to history
                saveToHistory(outputName + '.' + format, currentFile.size, format);
                
                progressLabel.textContent = 'Complete!';
            } catch (error) {
                console.error('Conversion failed:', error);
                progressLabel.textContent = 'Conversion failed';
            } finally {
                setTimeout(() => {
                    progressContainer.style.display = 'none';
                    document.querySelectorAll('button').forEach(btn => btn.disabled = false);
                }, 2000);
            }
        }

        // Progress Ring Animation
        function updateProgress(percent) {
            const circle = document.getElementById('progressCircle');
            const text = document.getElementById('progressText');
            const circumference = 471;
            circle.style.strokeDasharray = `${percent * circumference} ${circumference}`;
            text.textContent = Math.round(percent * 100) + '%';
        }

        // Theme Management
        function toggleTheme() {
            isDark = !isDark;
            document.body.dataset.theme = isDark ? 'dark' : 'light';
            document.getElementById('themeToggle').innerHTML = isDark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        function changeTheme(themeName) {
            currentTheme = themeName;
            document.getElementById('currentTheme').textContent = themeName.charAt(0).toUpperCase() + themeName.slice(1);
            Object.entries(themes[themeName]).forEach(([key, value]) => {
                document.documentElement.style.setProperty(key, value);
            });
            localStorage.setItem('currentTheme', themeName);
            toggleThemeOverlay();
        }

        function updateTheme() {
            const savedTheme = localStorage.getItem('currentTheme') || 'indigo';
            const savedMode = localStorage.getItem('theme') || 'dark';
            currentTheme = savedTheme;
            isDark = savedMode === 'dark';
            document.body.dataset.theme = isDark ? 'dark' : 'light';
            changeTheme(savedTheme);
        }

        function toggleThemeOverlay() {
            const overlay = document.getElementById('themeOverlay');
            overlay.classList.toggle('active');
            if (overlay.classList.contains('active')) {
                renderThemePreviews();
            }
        }

        function renderThemePreviews() {
            const container = document.getElementById('themePreviews');
            container.innerHTML = '';
            Object.entries(themes).forEach(([name, colors]) => {
                const swatch = document.createElement('div');
                swatch.className = 'theme-swatch';
                swatch.title = name;
                swatch.style.background = `linear-gradient(135deg, ${colors['--accent-primary']}, ${colors['--accent-secondary']})`;
                if (name === currentTheme) swatch.classList.add('active');
                swatch.onclick = () => changeTheme(name);
                container.appendChild(swatch);
            });
        }

        // Pro Features
        function applyPreset(preset) {
            if (preset === 'loud') {
                document.getElementById('normalizeAudio').checked = true;
                document.getElementById('volumeSlider').value = '1.5';
                document.getElementById('volumeValue').textContent = '1.5x';
            } else if (preset === 'clear') {
                document.getElementById('removeNoise').checked = true;
                document.getElementById('normalizeAudio').checked = true;
            }
        }

        function toggleNormalizer() {
            const checkbox = document.getElementById('normalizeAudio');
            checkbox.checked = !checkbox.checked;
        }

        function enableBatchMode() {
            alert('Batch mode coming soon in Pro version!');
        }

        // History Management
        function saveToHistory(filename, size, format) {
            const entry = {
                id: Date.now(),
                filename,
                size: formatBytes(size),
                format,
                date: new Date().toLocaleString(),
                duration: document.getElementById('duration').textContent
            };
            history.unshift(entry);
            history = history.slice(0, 50);
            localStorage.setItem('conversionHistory', JSON.stringify(history));
            updateHistory();
        }

        function updateHistory() {
            const container = document.getElementById('historyList');
            if (history.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: var(--text-secondary);">No conversions yet</div>';
                return;
            }
            container.innerHTML = history.map(entry => `
                <div class="history-item">
                    <div style="font-weight: 600; margin-bottom: 0.5rem;">${entry.filename}</div>
                    <div style="font-size: 0.875rem; color: var(--text-secondary); display: flex; justify-content: space-between;">
                        <span>${entry.format.toUpperCase()}</span>
                        <span>${entry.date}</span>
                    </div>
                </div>
            `).join('');
        }

        // Auth Integration
        function initGoogleAuth() {
            window.google.accounts.id.initialize({
                client_id: 'YOUR_GOOGLE_CLIENT_ID', // Replace with your client ID
                callback: handleGoogleSignIn
            });
            window.google.accounts.id.renderButton(
                document.getElementById('authBtn'),
                { theme: 'outline', size: 'large', type: 'standard' }
            );
        }

        function handleGoogleSignIn(response) {
            user = JSON.parse(atob(response.credential.split('.')[1]));
            document.getElementById('authBtn').textContent = `Hi, ${user.name}`;
            updateHistory();
        }

        function toggleAuth() {
            document.getElementById('authOverlay').classList.toggle('active');
        }

        function emailLogin() {
            const email = prompt('Enter email:');
            if (email) {
                user = { email };
                document.getElementById('authBtn').innerHTML = `${user.email}<i class="fas fa-sign-out-alt" onclick="signOut()"></i>`;
            }
        }

        function signOut() {
            user = null;
            document.getElementById('authBtn').textContent = 'Sign In';
        }

        // Utility Functions
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function resetApp() {
            document.getElementById('fileInfo').style.display = 'none';
            document.getElementById('fileInput').value = '';
            document.getElementById('convertBtn').disabled = true;
            currentFile = null;
            if (audioContext) audioContext.close();
        }

        // Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlayback();
            } else if (e.code === 'Enter' && !document.getElementById('convertBtn').disabled) {
                startConversion();
            }
        });

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
